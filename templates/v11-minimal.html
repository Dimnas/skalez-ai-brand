<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1350px;
    background: #0A0A0F;
    font-family: "IBM Plex Mono", "SF Mono", "Menlo", monospace;
    color: #F5F5F0;
    padding: 120px 80px 80px;
    display: flex;
    flex-direction: column;
  }

  /* ── Slide type helpers ── */
  .slide-cover { justify-content: center; }
  .slide-media  { padding-top: 60px; }
  .slide-text   { justify-content: center; }
  .slide-cta    { justify-content: center; }

  /* ── Prompt ── */
  .prompt {
    font-size: 14px;
    color: #6B6B70;
    margin-bottom: 48px;
  }
  .prompt::before {
    content: '$ ';
    color: #33FF00;
  }

  /* ── ANSI Shadow ── */
  .ansi {
    font-size: 8px;
    line-height: 1.0;
    color: #F5F5F0;
    white-space: pre;
    margin-bottom: 48px;
  }

  /* ── Headlines ── */
  h1 {
    font-size: 72px;
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  h2 {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  /* ── Body ── */
  p {
    font-size: 18px;
    line-height: 1.6;
    color: #6B6B70;
    max-width: 760px;
  }

  /* ── Media ── */
  .media {
    width: 920px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 40px;
    background: #141418;
  }
  .media img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  /* ── Tag ── */
  .tag {
    font-size: 12px;
    font-weight: 600;
    color: #FFB627;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  /* ── CTA ── */
  .cmd {
    font-size: 32px;
    font-weight: 500;
    color: #33FF00;
  }
  .cmd::before {
    content: '> ';
    color: #FFB627;
  }
  .cursor {
    display: inline-block;
    width: 16px;
    height: 32px;
    background: #33FF00;
    animation: blink 1s steps(1) infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
</style>
</head>
<body class="slide-cover">
  <!-- SLIDE_CONTENT -->
</body>
</html>
