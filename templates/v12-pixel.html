<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #000000;
    font-family: "Press Start 2P", "Courier New", monospace;
    color: #FFFFFF;
    padding: 120px 80px 80px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  /* ── Pixel Hand Cursor SVG ── */
  .hand-cursor {
    width: 160px;
    height: 220px;
    margin-bottom: 100px;
    align-self: flex-end;
    margin-right: 40px;
  }

  /* ── Labels ── */
  .label {
    font-size: 14px;
    color: #888888;
    letter-spacing: 0.12em;
    margin-bottom: 40px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* ── Mega Headlines ── */
  .mega {
    font-size: 72px;
    line-height: 1.15;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    color: #FFFFFF;
  }

  /* ── Subtitle ── */
  .sub {
    font-size: 24px;
    color: #AAAAAA;
    line-height: 1.5;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 40px;
    max-width: 800px;
  }

  /* ── Media Frame ── */
  .media {
    width: 920px;
    height: 580px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 48px;
    background: #0A0A0A;
  }
  .media img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  .media-caption {
    font-size: 20px;
    color: #888888;
    line-height: 1.6;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }

  /* ── CTA ── */
  .cta {
    font-size: 28px;
    color: #33FF00;
    margin-top: 80px;
  }
  .cta::before {
    content: '> ';
    color: #FFB627;
  }
  .cursor {
    display: inline-block;
    width: 16px;
    height: 28px;
    background: #33FF00;
    animation: blink 1s steps(1) infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* ── Slide type variants ── */
  .slide-cover { justify-content: flex-start; }
  .slide-media  { padding-top: 60px; }
  .slide-text   { justify-content: center; }
</style>
</head>
<body class="slide-cover">
  <!-- SLIDE_CONTENT -->
</body>
</html>
